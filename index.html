<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Blog</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121933;
      --text: #e8ecff;
      --muted: #9aa3c7;
      --line: #243056;
      --accent: #7aa2ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #111831 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 56px 20px;
    }
    .hero {
      padding: 32px;
      background: rgba(18, 25, 51, 0.88);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 42px;
      line-height: 1.15;
    }
    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 28px;
    }
    .card {
      padding: 20px;
      background: rgba(18, 25, 51, 0.88);
      border: 1px solid var(--line);
      border-radius: 16px;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }
    .foot {
      margin-top: 28px;
      color: var(--muted);
      font-size: 14px;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>AI Blog</h1>
      <p class="sub">
        分享 AI 工具、工作流与真实使用经验。<br>
        这里会持续记录 AI 相关的实践、思考与可复用方法。
      </p>
    </section>

    <section class="grid">
      <div class="card">
        <h2>AI Tools</h2>
        <p>记录值得关注的 AI 工具、使用体验与适用场景。</p>
      </div>
      <div class="card">
        <h2>AI Workflow</h2>
        <p>整理可复用的 AI 工作流，关注效率与实际落地。</p>
      </div>
      <div class="card">
        <h2>AI Practice</h2>
        <p>分享具体案例，从需求到结果，尽量讲清过程。</p>
      </div>
      <div class="card">
        <h2>AI Notes</h2>
        <p>存放短笔记、提示词片段、观察记录与小技巧。</p>
      </div>
    </section>

    <p class="foot">
      Blog setup complete. Content is coming soon.
    </p>
  </div>
</body>
</html>
